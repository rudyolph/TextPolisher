name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --clean --name TextPolisher text_polisher.py
        
    - name: Package Release
      run: |
        mkdir release
        copy dist\TextPolisher.exe release\
        copy prompt.txt release\
        powershell Compress-Archive -Path release\* -DestinationPath TextPolisher.zip
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          TextPolisher.zip
          dist/TextPolisher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
